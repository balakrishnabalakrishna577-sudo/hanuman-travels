databases:
  - name: hanuman-travels-db
    databaseName: hanuman_travels
    user: hanuman_travels_user
    plan: free

services:
  - type: web
    name: hanuman-travels
    env: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "gunicorn hanuman_travels.wsgi:application"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: ".onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: hanuman-travels-db
          property: connectionString
      - key: CLOUDINARY_URL
        sync: false
