{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login — Hanuman Tours And Travels</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            display: flex; align-items: center; justify-content: center;
        }
        .login-card {
            background: #fff;
            border-radius: 20px;
            padding: 2.5rem 2rem;
            width: 100%; max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        .brand-icon {
            width: 64px; height: 64px;
            background: linear-gradient(135deg, #ff8c00, #e07800);
            border-radius: 16px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.8rem; color: #fff;
            margin: 0 auto 1rem;
            box-shadow: 0 6px 20px rgba(255,140,0,0.4);
        }
        .form-control {
            border-radius: 10px;
            border: 1.5px solid #e5e5e5;
            padding: 0.6rem 1rem;
            font-size: 0.88rem;
            font-family: 'Poppins', sans-serif;
        }
        .form-control:focus {
            border-color: #ff8c00;
            box-shadow: 0 0 0 3px rgba(255,140,0,0.12);
        }
        .btn-login {
            background: linear-gradient(135deg, #ff8c00, #e07800);
            color: #fff; border: none; border-radius: 10px;
            padding: 0.7rem; font-weight: 700; font-size: 0.95rem;
            width: 100%; transition: all 0.2s;
        }
        .btn-login:hover { background: #e07800; color: #fff; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(255,140,0,0.4); }
        .back-link { color: #888; font-size: 0.8rem; text-decoration: none; }
        .back-link:hover { color: #ff8c00; }
    </style>
</head>
<body>
<div class="login-card">
    <div class="brand-icon"><i class="bi bi-shield-lock-fill"></i></div>
    <h5 class="fw-bold text-center mb-1">Admin Login</h5>
    <p class="text-muted text-center small mb-4">Hanuman Tours And Travels — Staff Only</p>

    {% if error %}
    <div class="alert alert-danger py-2 small">{{ error }}</div>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div class="mb-3">
            <label class="form-label fw-semibold small">Username</label>
            <div class="input-group">
                <span class="input-group-text bg-light border-end-0" style="border-radius:10px 0 0 10px;border:1.5px solid #e5e5e5;">
                    <i class="bi bi-person-fill text-warning"></i>
                </span>
                <input type="text" name="username" class="form-control border-start-0" placeholder="Admin username" required autofocus style="border-radius:0 10px 10px 0;">
            </div>
        </div>
        <div class="mb-4">
            <label class="form-label fw-semibold small">Password</label>
            <div class="input-group">
                <span class="input-group-text bg-light border-end-0" style="border-radius:10px 0 0 10px;border:1.5px solid #e5e5e5;">
                    <i class="bi bi-lock-fill text-warning"></i>
                </span>
                <input type="password" name="password" class="form-control border-start-0" placeholder="Password" required style="border-radius:0 10px 10px 0;">
            </div>
        </div>
        <button type="submit" class="btn-login">
            <i class="bi bi-box-arrow-in-right me-2"></i>Login to Admin Panel
        </button>
    </form>

    <div class="text-center mt-4">
        <a href="{% url 'home' %}" class="back-link"><i class="bi bi-arrow-left me-1"></i>Back to Website</a>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
