{% extends 'base.html' %}

{% block content %}
<section class="py-5 bg-light min-vh-100 d-flex align-items-center">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-5">
                <div class="card border-0 shadow-sm p-4">
                    <div class="text-center mb-4">
                        <i class="bi bi-airplane-fill text-warning fs-1"></i>
                        <h4 class="fw-bold mt-2">Welcome Back!</h4>
                        <p class="text-muted">Login to your Hanuman Tours and Travels account</p>
                    </div>
                    <form method="post" novalidate>
                        {% csrf_token %}
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Username</label>
                            {{ form.username }}
                        </div>
                        <div class="mb-3">
                            <label class="form-label fw-semibold">Password</label>
                            {{ form.password }}
                        </div>
                        <button type="submit" class="btn btn-warning w-100 fw-bold btn-lg">
                            <i class="bi bi-box-arrow-in-right me-2"></i>Login
                        </button>
                    </form>
                    <p class="text-center mt-3 text-muted small">Don't have an account? <a href="{% url 'register' %}" class="text-warning fw-semibold">Register here</a></p>
                </div>
            </div>
        </div>
    </div>
</section>
{% endblock %}
